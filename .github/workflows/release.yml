name: Release

on:
  push:
    branches:
      - main

# Serialize publishes; do not cancel an in-flight release job.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Create Release PR or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7.0.0
        with:
          token: ${{ secrets.PAT_FOR_RELEASES || secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          # OIDC trusted publishing needs npm >= 11.5.1 (Node >= 22.14.0).
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # No NPM_TOKEN: publishes via OIDC trusted publishing (id-token: write).
      # Requires a trusted publisher for this package configured on npmjs.com.
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          publish: pnpm run cs:publish
          commit: "chore: update versions and changelogs"
          title: "chore: version packages for release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
